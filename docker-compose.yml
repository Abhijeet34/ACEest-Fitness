services:
  aceest-app:
    build: .
    ports:
      - "5001:5000"
    environment:
      - SECRET_KEY=change-in-production
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
